<div
  class="item-child"
  matRipple
  matRippleColor="#4d4d5c6e"
  (click)="onClick(item()?.relatedProject)"
>
  <!-- <p>{{ item.type }}</p> -->
  <img [src]="item()?.img" alt="" />
  <mat-progress-bar mode="determinate" [value]="count"></mat-progress-bar>
  <p class="percent">{{ count }}%</p>
</div>
