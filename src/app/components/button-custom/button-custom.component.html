<button
  class="button"
  [style]="{
  'border-with': this.SlsBtn.borderSize,
  'border-radius': this.SlsBtn.roundBorder,
  'padding': this.SlsBtn.padding,
}"
>
  @for(ch of getTextArr;track $index ){
  <span [style]="{ 
    'font-size': this.SlsBtn.fontSize, 
    'padding': this.SlsBtn.spanPd,
    }">{{ ch }}</span>
  }
</button>
